name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 4. Run tests
      - name: Run Tests
        run: flutter test

      # 5. Build APK
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 6. Upload artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk

      # 7. Create GitHub Release (saat tag)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/*.apk

      # 8. Kirim APK + notif (success)
      - name: Send APK + Notification
        if: success()
        run: |
          for file in build/app/outputs/flutter-apk/*.apk; do
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
            -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -F document=@$file \
            -F caption="✅ Build BERHASIL 🚀\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"
          done

      # 9. Kirim notif gagal
      - name: Notify Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Build GAGAL 🚨\nCommit: ${{ github.sha }}\nBranch: ${{ github.ref_name }}"